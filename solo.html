---
layout: default
title: "一個人喝的葡萄酒推薦"
description: "適合下班放鬆、追劇與日常小酌的葡萄酒推薦。"
permalink: /solo/
---

<section class="page-hero">
  <div class="container">
    <p class="eyebrow">SOLO</p>
    <h1>一個人喝酒，不需要理由</h1>
    <p>選一瓶讓你放鬆的酒就好。</p>
  </div>
</section>

<section class="section section-light">
  <div class="container">

    <h2>選酒方向</h2>

    <div class="card-grid three">
      <div class="info-card">
        <h3>輕鬆</h3>
        <p>不要太厚重。</p>
      </div>
      <div class="info-card">
        <h3>容易入口</h3>
        <p>不需要醒酒。</p>
      </div>
      <div class="info-card">
        <h3>看心情</h3>
        <p>白酒、紅酒都可以。</p>
      </div>
    </div>

  </div>
</section>

<section class="section section-dark">
  <div class="container">

    <h2>推薦酒款</h2>

    <div class="wine-list-grid">
      {% for wine in site.wines limit:6 %}
      <a class="wine-list-card" href="{{ wine.url | relative_url }}">
        <div class="wine-list-image" style="background-image: url('{{ wine.image | relative_url }}');"></div>
        <div class="wine-list-content">
          <h4>{{ wine.title }}</h4>
        </div>
      </a>
      {% endfor %}
    </div>

    <hr>

    <ul>
      <li><a href="{{ '/gifts/' | relative_url }}">送禮酒推薦</a></li>
      <li><a href="{{ '/dinner/' | relative_url }}">聚餐酒怎麼選</a></li>
    </ul>

  </div>
</section>
